stages:
  - build

build-and-push:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
  script:
    - docker build -t $DOCKER_HUB_USERNAME/radarr-monitor:latest -t $DOCKER_HUB_USERNAME/radarr-monitor:$CI_COMMIT_SHORT_SHA .
    - docker push $DOCKER_HUB_USERNAME/radarr-monitor:latest
    - docker push $DOCKER_HUB_USERNAME/radarr-monitor:$CI_COMMIT_SHORT_SHA
  only:
    - main
